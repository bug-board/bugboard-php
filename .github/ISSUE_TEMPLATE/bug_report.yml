name: Bug report
description: Something in the SDK isn't behaving as documented.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        **Never include API keys or signing secrets in an issue.**
        Security vulnerabilities should be reported privately — see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest snippet (or repo link) that reproduces the problem.
      render: php
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SDK version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: PHP & framework
      placeholder: e.g. PHP 8.3 / Laravel 12 / Symfony 7.2 / plain PHP
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Debug output
      description: If possible, re-run with `debug` enabled and paste the `[bugboard]` lines from your error log (keys are auto-redacted, but double-check).
      render: text
